version: '3.8'
services:
  qrbag:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/qrbag.db
      - NODE_ENV=development
    volumes:
      - qrbag_data:/app/data

volumes:
  qrbag_data:
